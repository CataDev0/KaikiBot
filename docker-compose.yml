services:
    db:
        image: mariadb:latest
        restart: unless-stopped
        env_file: ./.env
        command: --wait-timeout=28800
        ports:
            - "3307:3306"
        volumes:
            - db:/var/lib/mysql

    kaikibot:
        depends_on:
            - db
        build:
            context: .
        restart: unless-stopped
        env_file: ./.env
        stdin_open: true
        tty: true
volumes:
    db:
